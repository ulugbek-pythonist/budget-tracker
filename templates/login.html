<style>
    form{
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        border: 3px solid whitesmoke;
        width: 40%;
        height: 40vh;
        margin-left: 30%;
        border-radius: 3%;
        background-color: tomato;
    }

    #tugma{
        border: 1px solid red;
        width: 100px;
        height: 27px;
        border-radius: 50px;
        background-color: white;
    }

    #tugma:hover{
        background-color: dodgerblue;
    }

    h2{
        text-align: center;
        color: dodgerblue;
        font-weight: 900;
    }
</style>

<h2>Login</h2>
<form action="{% url 'login' %}" method="post">
    {% csrf_token %}
    {{form.as_p}}
    <input type="submit" value="login" id="tugma">
</form>
