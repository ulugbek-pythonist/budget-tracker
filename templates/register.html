<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        body{
            background-color: antiquewhite;
            box-sizing: border-box;
        }

        h2{
            text-align: center;
        }

        nav{
            width: auto;
            height: 10vh;
            background-color: tomato;
        }
        .links{
            display: flex;
            justify-content: space-evenly;
            padding: 20px;
            padding-left: 60%;
        }

        a{
            color: snow;
            font-size: larger;
            font-weight: bold;
            text-decoration: none;
        }

    </style>
</head>
<body>
    <header>
        <nav>
            <div class="links">
                <a href="{% url 'home' %}">Home</a>
                <a href="#">About</a>
                <a href="#">Login</a>
                <a href="#">Developer</a>
            </div>
        </nav>
    </header>
    <main>
        <h2>Registration</h2>
        <br><br>
        <form  method="post" enctype="multipart/form-data">

            {% csrf_token %}
            
            {{form.as_p}}

            <button type="submit" class="tugma">Finish</button>
        </form>
    </main>
</body>
</html>
